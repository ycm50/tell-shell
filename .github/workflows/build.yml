name: Build Tell Shell

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '构建标签 (如 v1.0.0)'
        required: true
        type: string
      arch:
        description: '目标架构'
        required: true
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - x86
        default: arm64-v8a

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (${{ inputs.arch }})
        run: ./gradlew assembleRelease -Pandroid.injected.abifilters=${{ inputs.arch }} --no-configuration-cache
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TellShell-${{ inputs.tag }}-${{ inputs.arch }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
