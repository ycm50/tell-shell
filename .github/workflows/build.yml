name: Build Tell Shell

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '版本标签 (如 v1.0.0)'
        required: true
        type: string
      arch:
        description: '目标架构'
        required: true
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - x86
        default: arm64-v8a

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (${{ inputs.arch }})
        run: ./gradlew assembleRelease -Pandroid.injected.abifilters=${{ inputs.arch }} --no-configuration-cache
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/TellShell-${{ inputs.tag }}-${{ inputs.arch }}.apk

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Tell Shell ${{ inputs.tag }}
          body: |
            ## Tell Shell ${{ inputs.tag }}

            **架构**: ${{ inputs.arch }}

            从 GitHub Actions 手动构建发布。
          draft: false
          prerelease: false
          make_latest: true
          files: app/build/outputs/apk/release/TellShell-${{ inputs.tag }}-${{ inputs.arch }}.apk
